<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Time Clock LP Test — by campaign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    /* WorkEasy Software brand palette */
    --white:#FFFFFF;      /* 50% — main       */
    --navy:#132F45;       /* 30% — primary    */
    --mist:#E9EFF4;       /* 10% — secondary  */
    --slate:#546571;      /*  5%              */
    --grad-1:#3833D7;     /*  5% — accent     */
    --grad-2:#6F39E5;
    --grad-3:#A73AFB;
    --mark-1:#FF661F;     /* logomark gradient */
    --mark-2:#F98128;
    --mark-3:#F8B44F;

    --accent:linear-gradient(-35deg,var(--grad-1),var(--grad-2),var(--grad-3));
    --mark:linear-gradient(-35deg,var(--mark-1),var(--mark-2),var(--mark-3));

    --rule:rgba(19,47,69,.14);
    --rule-hard:rgba(19,47,69,.30);
    --flag-wash:rgba(255,102,31,.09);

    --f:'Work Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--mist);
    font-family:var(--f);
    color:var(--navy);
    padding:20px 14px 96px;
    -webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
  }

  .deck{max-width:1680px;margin:0 auto}

  .slide{
    background:var(--white);
    border-radius:14px;
    box-shadow:0 18px 44px rgba(19,47,69,.14);
    overflow:hidden;
    display:none;
    animation:in .32s cubic-bezier(.2,.7,.3,1) both;
  }
  .slide.on{display:block}
  @keyframes in{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}

  /* ---------- header band (navy) ---------- */
  .band{background:var(--navy);color:var(--white);padding:22px 26px 24px;position:relative}
  .band::after{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--accent)}

  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:20px}

  /* official logo — white wordmark + gradient logomark, for dark backgrounds only */
  .logo{display:block;width:208px;height:auto;flex:0 0 auto}
  @media (max-width:760px){.logo{width:168px}}

  .slidetag{
    font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
    color:var(--mist);border:1px solid rgba(233,239,244,.34);border-radius:40px;padding:5px 14px;
  }

  .eyebrow{font-size:13px;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:var(--mist);opacity:.82;margin:0 0 10px}
  h1{font-size:clamp(27px,3.9vw,46px);font-weight:600;letter-spacing:-.021em;line-height:1.05;margin:0;max-width:19ch}
  h1 .lt{font-weight:400;color:var(--mist);opacity:.72}

  .facts{display:flex;gap:34px;flex-wrap:wrap;margin-top:22px;padding-top:19px;border-top:1px solid rgba(233,239,244,.22)}
  .fact .k{display:block;font-size:11px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);opacity:.72;margin-bottom:5px}
  .fact .v{font-size:22px;font-weight:600;letter-spacing:-.015em}
  .fact .v.grad{background:var(--accent);-webkit-background-clip:text;background-clip:text;color:transparent}
  .fact .v.warn{color:var(--mark-3)}

  /* ---------- controls ---------- */
  .controls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;padding:16px 26px;border-bottom:1px solid var(--rule)}
  .ctl-k{font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--slate);margin-right:4px}

  /* primary button — outlined navy on light */
  .btn{
    font-family:var(--f);font-size:14px;font-weight:500;
    background:var(--white);border:1.5px solid var(--navy);color:var(--navy);
    padding:7px 16px;border-radius:40px;cursor:pointer;
    transition:background .14s,color .14s;
  }
  .btn:hover{background:var(--mist)}
  .btn[aria-pressed="true"]{background:var(--navy);color:var(--white)}
  .btn:focus-visible{outline:2px solid var(--grad-2);outline-offset:2px}

  /* accent button — gradient fill */
  .btn.accent{background:var(--accent);border:1.5px solid transparent;color:var(--white)}
  .btn.accent:hover{filter:brightness(1.08)}
  .btn.accent[aria-pressed="true"]{background:var(--navy);border-color:var(--navy)}
  .sp{flex:1}

  /* ---------- table ---------- */
  .tw{padding:4px 26px 8px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  tr.hdr th{
    font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--slate);
    text-align:right;padding:8px 7px;white-space:nowrap;
    background:rgba(233,239,244,.6);
    border-top:1.5px solid var(--rule-hard);border-bottom:1.5px solid var(--rule-hard);
  }
  tr.hdr th.lft{text-align:left;padding-left:10px}
  tr.hdr th.cv{background:rgba(233,239,244,.95);color:var(--navy)}
  tbody td{font-size:14.5px;font-weight:400;text-align:right;padding:9px 7px;border-bottom:1px solid var(--rule);white-space:nowrap}
  tbody td.lft{text-align:left;padding-left:0}

  tr.arm td{border-bottom:none;padding-top:30px;padding-bottom:9px}
  tr.arm .lft{font-size:19px;font-weight:600;letter-spacing:-.014em}
  tr.arm .note{font-size:13px;font-weight:400;color:var(--slate)}

  tr.camp td{transition:background .13s}
  tr.camp:hover td{background:var(--mist)}
  tr.camp .lft{padding-left:16px;font-weight:500;position:relative}
  tr.camp .lft::before{content:'';position:absolute;left:1px;top:1.05em;width:8px;height:1.5px;background:var(--rule-hard)}
  .csub{display:block;font-size:11px;font-weight:400;color:var(--slate);margin-top:2px;letter-spacing:.01em}

  tr.tot td{border-top:1.5px solid var(--rule-hard);border-bottom:2px solid var(--navy);font-weight:600;background:rgba(233,239,244,.5)}
  tr.tot .lft{font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase}

  td.zero{color:var(--slate);opacity:.55}
  td.flag{color:var(--mark-1);font-weight:600}
  /* gradient lives on a span, not the cell, so row backgrounds can change freely */
  .posv{background:var(--accent);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600}
  .na{color:var(--slate);opacity:.32}
  td.cv{font-size:12px;font-weight:500;color:var(--slate);background:rgba(233,239,244,.45)}
  tr.tot td.cv{background:rgba(233,239,244,.9);color:var(--navy);font-weight:600}
  tr.camp:hover td.cv{background:var(--mist)}
  tr.dim td{opacity:.24}

  /* flagged-row highlight */
  body.flagged tr.hot td{background:var(--flag-wash)}
  body.flagged tr.hot .lft{box-shadow:inset 3px 0 0 var(--mark-1)}
  .pill{
    display:none;margin-left:9px;vertical-align:1px;
    font-size:9.5px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
    background:var(--mark);color:var(--white);padding:3px 8px;border-radius:40px;
  }
  body.flagged .pill{display:inline-block}

  /* ---------- funnel comparison ---------- */
  .fnwrap{padding:6px 26px 4px}
  .fnhd{display:flex;align-items:baseline;gap:12px;margin:14px 0 16px;flex-wrap:wrap}
  .fnhd h3{font-size:15px;font-weight:600;margin:0;letter-spacing:-.01em}
  .fnhd span{font-size:13px;color:var(--slate)}
  .fnhd .sp{flex:1}
  tr.hh td{padding-top:13px;padding-bottom:13px}
  .fn{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .fncol{border-top:2px solid var(--navy);padding-top:12px}
  .fncol h4{font-size:14px;font-weight:600;margin:0 0 2px;letter-spacing:-.01em}
  .fncol .sub{font-size:11.5px;color:var(--slate);margin:0 0 13px}
  .fnrow{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .fnlab{width:38px;font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);flex:0 0 auto}
  .fntrack{flex:1;height:20px;background:var(--mist);border-radius:3px;overflow:hidden}
  .fnfill{height:100%;background:var(--navy);border-radius:3px;transition:width .45s cubic-bezier(.2,.7,.3,1)}
  .fnfill.acc{background:var(--accent)}
  .fnval{width:42px;text-align:right;font-size:12.5px;font-weight:600;flex:0 0 auto}
  .fndrop{font-size:11.5px;color:var(--mark-1);font-weight:600;margin:-3px 0 8px 47px}
  @media (max-width:900px){.fn{grid-template-columns:1fr}}

  /* ---------- takeaway ---------- */
  .take{margin:6px 26px 0;padding:20px 0 0;border-top:2px solid var(--navy);display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
  .take .tag{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;background:var(--navy);color:var(--white);padding:6px 13px;border-radius:40px;white-space:nowrap}
  .take .tag.acc{background:var(--accent)}
  .take p{margin:0;font-size:18px;font-weight:400;line-height:1.5;flex:1;min-width:270px;color:var(--navy)}
  .take b{font-weight:600}
  .take .hl{background:var(--accent);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600}
  .take .wn{color:var(--mark-1);font-weight:600}

  /* ---------- notes ---------- */
  .notes{padding:22px 26px 12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:20px 30px}
  .note h4{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);margin:0 0 7px}
  .note{font-size:14px;font-weight:400;line-height:1.55;color:var(--slate)}
  .note b{color:var(--navy);font-weight:600}
  .note .wn{color:var(--mark-1);font-weight:600}
  .note code{font-family:inherit;font-size:13px;background:var(--mist);padding:1px 5px;border-radius:3px;color:var(--navy)}

  .foot{padding:16px 26px 22px;border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .foot small{font-size:12px;color:var(--slate)}
  .tagline{font-size:17px;font-weight:600;letter-spacing:-.01em;background:var(--accent);-webkit-background-clip:text;background-clip:text;color:transparent}

  /* ---------- nav ---------- */
  .nav{position:fixed;left:0;right:0;bottom:0;padding:14px 20px;background:var(--navy);display:flex;gap:13px;align-items:center;justify-content:center;box-shadow:0 -6px 22px rgba(19,47,69,.2)}
  .nav .nb{font-family:var(--f);font-size:14px;font-weight:500;background:transparent;border:1.5px solid var(--white);color:var(--white);padding:7px 16px;border-radius:40px;cursor:pointer;transition:background .14s,color .14s}
  .nav .nb:hover:not(:disabled){background:var(--white);color:var(--navy)}
  .nav .nb:disabled{opacity:.32;cursor:default}
  .nav .nb:focus-visible{outline:2px solid var(--grad-3);outline-offset:2px}
  .dots{display:flex;gap:8px;margin:0 5px}
  .dots button{width:38px;height:6px;padding:0;border-radius:40px;border:1px solid rgba(233,239,244,.5);background:transparent;cursor:pointer}
  .dots button[aria-current="true"]{background:var(--accent);border-color:transparent}
  .navlabel{font-size:12px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;color:var(--mist);opacity:.75}

  @media (max-width:760px){
    body{padding:14px 10px 92px}
    .band,.controls,.tw,.notes,.foot{padding-left:20px;padding-right:18px}
    .take{margin-left:20px;margin-right:18px}
    .facts{gap:22px}
    .navlabel{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="deck">
  <section class="slide on" id="s1" aria-label="Slide 1"></section>
  <section class="slide" id="s2" aria-label="Slide 2"></section>
  <section class="slide" id="s3" aria-label="Slide 3"></section>
</div>

<nav class="nav">
  <button class="nb" id="prev">← Prev</button>
  <div class="dots">
    <button data-go="0" aria-current="true" aria-label="Slide 1: all leads"></button>
    <button data-go="1" aria-label="Slide 2: fakes removed"></button>
    <button data-go="2" aria-label="Slide 3: head to head"></button>
  </div>
  <button class="nb" id="next">Next →</button>
  <span class="navlabel" id="navlabel">01 / 03 — all leads</span>
</nav>

<script>
const CAMPAIGNS = [
  {id:'23021788224', name:'Brand search',     sub:'“easy clocking” · ppc'},
  {id:'23031752638', name:'Non-brand search', sub:'time-clock keywords · ppc'},
  {id:'23234508449', name:'Demand Gen',       sub:'auto-placed · cpc · numeric IDs'}
];

// [leads, fake, reachedMQL, reachedSQL, reachedOpp, reachedCust, arr]
// Source: employee-time-clock-ab-leads-2026-07-21.csv (64 records, 25 Jun - 21 Jul 2026)
// Stage counts are CUMULATIVE ("reached this stage or beyond"): the CRM stores one
// current stage per record, so cumulative is what makes the step %s valid.
const ALL = {
  'Control (current)':    {v:3579, r:{'23021788224':null,
                                      '23031752638':[12,1,10,6,5,0,7209],
                                      '23234508449':[9,8,1,0,0,0,0]}},
  'A \u2014 bold redesign':    {v:3542, r:{'23021788224':[2,0,2,1,1,0,1200],
                                      '23031752638':[5,1,4,3,2,1,371],
                                      '23234508449':[16,15,1,0,0,0,0]}},
  'B \u2014 optimized current':{v:3383, r:{'23021788224':[2,0,2,0,0,0,0],
                                      '23031752638':[9,2,7,1,1,0,130000],
                                      '23234508449':[9,7,2,0,0,0,0]}}
};

const CLEAN = {
  'Control (current)':    {v:3579, r:{'23021788224':null,
                                      '23031752638':[11,0,10,6,5,0,7209],
                                      '23234508449':[1,0,1,0,0,0,0]}},
  'A \u2014 bold redesign':    {v:3542, r:{'23021788224':[2,0,2,1,1,0,1200],
                                      '23031752638':[4,0,4,3,2,1,371],
                                      '23234508449':[1,0,1,0,0,0,0]}},
  'B \u2014 optimized current':{v:3383, r:{'23021788224':[2,0,2,0,0,0,0],
                                      '23031752638':[7,0,7,1,1,0,130000],
                                      '23234508449':[2,0,2,0,0,0,0]}}
};

const money = n => n ? '$' + n.toLocaleString('en-US') : '—';
const posCell = n => `<td class="${n?'':'zero'}">${n?`<span class="posv">${n}</span>`:n}</td>`;
const sum = o => {const t=[0,0,0,0,0,0,0,0];for(const k in o.r){const r=o.r[k];if(r)r.forEach((x,i)=>t[i]+=x);}return t;};

function table(D, mode){
  const heads = mode==='all'
    ? ['Campaign','Visitors','Conv rate','Leads','Fake','Fake rate',
       'Lead&nbsp;&rarr;&nbsp;MQL','MQL','MQL&nbsp;&rarr;&nbsp;SQL','SQL','SQL&nbsp;&rarr;&nbsp;Opp','Opp','Opp&nbsp;&rarr;&nbsp;Cust','Cust','ARR']
    : ['Campaign','Visitors','Conv rate','Real leads','Removed',
       'Lead&nbsp;&rarr;&nbsp;MQL','MQL','MQL&nbsp;&rarr;&nbsp;SQL','SQL','SQL&nbsp;&rarr;&nbsp;Opp','Opp','Opp&nbsp;&rarr;&nbsp;Cust','Cust','ARR'];
  const cvIdx = mode==='all' ? [2,6,8,10,12] : [2,5,7,9,11];

  // column labels repeat at the top of every page section
  const headRow = () => '<tr class="hdr">' +
    heads.map((x,i)=>`<th class="${i?'':'lft'}${cvIdx.includes(i)?' cv':''}">${x}</th>`).join('') + '</tr>';

  const pct=(a,b)=> b ? Math.round(a/b*100)+'%' : '&mdash;';
  const na = '<span class="na">&mdash;</span>';

  let h='<table><tbody>';

  for(const arm in D){
    const o=D[arm], t=sum(o), cols=heads.length;
    h+=`<tr class="arm"><td class="lft" colspan="2">${arm}</td>
        <td class="note" colspan="${cols-2}">25 Jun &ndash; 21 Jul 2026 &middot; 27 days</td></tr>`;
    h+=headRow();

    CAMPAIGNS.forEach(c=>{
      const row=o.r[c.id];
      if(!row){
        h+=`<tr class="camp" data-c="${c.id}"><td class="lft">${c.name}<span class="csub">${c.sub}</span></td>
            <td class="zero" colspan="${cols-1}" style="text-align:left;padding-left:14px">no traffic routed to this arm</td></tr>`;
        return;
      }
      const [l,f,mq,sq,op,cu,arr]=row;
      const fr = l ? Math.round(f/l*100) : 0;
      const hot = mode==='all' && fr>=50;
      const removed = ALL[arm].r[c.id] ? ALL[arm].r[c.id][0]-l : 0;
      h+=`<tr class="camp ${hot?'hot':''}" data-c="${c.id}">
          <td class="lft">${c.name}${hot?'<span class="pill">junk heavy</span>':''}<span class="csub">${c.sub}</span></td>
          <td>${na}</td><td class="cv">${na}</td>
          <td>${l}</td>`;
      h += mode==='all'
        ? `<td class="${f?'flag':'zero'}">${f}</td><td class="${fr>=50?'flag':''}">${fr}%</td>`
        : `<td class="${removed?'flag':'zero'}">${removed?'\u2212'+removed:'&mdash;'}</td>`;
      h+=`<td class="cv">${pct(mq,l)}</td><td class="${mq?'':'zero'}">${mq}</td>
          <td class="cv">${pct(sq,mq)}</td><td class="${sq?'':'zero'}">${sq}</td>
          <td class="cv">${pct(op,sq)}</td>${posCell(op)}
          <td class="cv">${pct(cu,op)}</td>${posCell(cu)}
          <td class="${arr?'':'zero'}">${money(arr)}</td></tr>`;
    });

    const [L,F,M,S,O,C,A]=t;
    const tfr=Math.round(F/L*100), rem=sum(ALL[arm])[0]-L;
    h+=`<tr class="tot"><td class="lft">${arm.split('\u2014')[0].trim()} total</td>
        <td>${o.v.toLocaleString()}</td><td class="cv">${(L/o.v*100).toFixed(2)}%</td>
        <td>${L}</td>`;
    h += mode==='all' ? `<td class="flag">${F}</td><td class="${tfr>=50?'flag':''}">${tfr}%</td>`
                      : `<td class="flag">\u2212${rem}</td>`;
    h+=`<td class="cv">${pct(M,L)}</td><td>${M}</td>
        <td class="cv">${pct(S,M)}</td><td>${S}</td>
        <td class="cv">${pct(O,S)}</td>${posCell(O)}
        <td class="cv">${pct(C,O)}</td>${posCell(C)}
        <td>${money(A)}</td></tr>`;
  }
  return h+'</tbody></table>';
}

      : `<td class="${lift<0?'flag':''}">${lift<0?'':'<span class="posv">'}${(lift*100).toFixed(1)}%${lift<0?'':'</span>'}</td>`;
    h+=`<tr class="camp hh">
        <td class="lft"><b>${d.name}</b><span class="csub">${d.tag} &middot; all campaigns combined</span></td>
        <td>${d.v.toLocaleString()}</td>
        <td class="cv">${(conv*100).toFixed(2)}%</td>
        ${liftCell}
        <td>${d.leads}</td>
        <td class="flag">\u2212${d.removed}</td>
        <td class="cv">${pct(d.M,d.leads)}</td><td>${d.M}</td>
        <td class="cv">${pct(d.S,d.M)}</td><td>${d.S}</td>
        <td class="cv">${pct(d.O,d.S)}</td>${posCell(d.O)}
        <td class="cv">${pct(d.C,d.O)}</td>${posCell(d.C)}
        <td>${money(d.arr)}</td></tr>`;
  });
  return h+'</tbody></table>';
}

function funnel(mode){
  const steps=['Leads','MQL','SQL','Opp','Cust'];
  const val=(d,k)=> mode==='per1k' ? d[k]/d.v*1000 : d[k];
  const keys=['leads','M','S','O','C'];
  let max=0; HEAD.forEach(d=>keys.forEach(k=>max=Math.max(max,val(d,k))));
  const fmt=x=> mode==='per1k' ? x.toFixed(2) : String(x);

  return HEAD.map(d=>{
    let rows='';
    keys.forEach((k,i)=>{
      const x=val(d,k), w=max? (x/max*100):0;
      rows+=`<div class="fnrow"><span class="fnlab">${steps[i]}</span>
             <span class="fntrack"><span class="fnfill${d.name[0]==='B'?' acc':''}" style="width:${w}%"></span></span>
             <span class="fnval">${fmt(x)}</span></div>`;
      if(i===1 && d.M){
        const drop=Math.round((1-d.S/d.M)*100);
        if(drop>=70) rows+=`<div class="fndrop">\u2193 ${drop}% lost at this step</div>`;
      }
    });
    return `<div class="fncol"><h4>${d.name}</h4><p class="sub">${d.leads} real leads &middot; ${d.v.toLocaleString()} visitors</p>${rows}</div>`;
  }).join('');
}

/* nav */
const cards=[document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3')];
const dots=[...document.querySelectorAll('.dots button')];
const label=document.getElementById('navlabel');
const names=['all leads','fakes removed','head to head'];
let cur=0;
function go(i){
  cur=Math.max(0,Math.min(2,i));
  cards.forEach((c,n)=>c.classList.toggle('on',n===cur));
  dots.forEach((d,n)=>d.setAttribute('aria-current',String(n===cur)));
  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===2;
  label.textContent=`0${cur+1} / 03 — ${names[cur]}`;
  window.scrollTo({top:0,behavior:'instant'});
}
document.getElementById('prev').onclick=()=>go(cur-1);
document.getElementById('next').onclick=()=>go(cur+1);
dots.forEach(d=>d.onclick=()=>go(+d.dataset.go));
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')go(cur+1);
  if(e.key==='ArrowLeft'||e.key==='PageUp')go(cur-1);
});
go(0);

/* campaign isolate */
document.querySelectorAll('[data-filter]').forEach(b=>{
  b.onclick=()=>{
    const card=b.closest('.slide'), on=b.getAttribute('aria-pressed')==='true';
    card.querySelectorAll('[data-filter]').forEach(x=>x.setAttribute('aria-pressed','false'));
    if(!on)b.setAttribute('aria-pressed','true');
    const want=on?null:b.dataset.filter;
    card.querySelectorAll('tr.camp').forEach(tr=>tr.classList.toggle('dim',!!want&&tr.dataset.c!==want));
  };
});

/* junk highlight */
const fb=document.getElementById('flagBtn');
fb.onclick=()=>{
  const on=fb.getAttribute('aria-pressed')==='true';
  fb.setAttribute('aria-pressed',String(!on));
  document.body.classList.toggle('flagged',!on);
  fb.textContent=on?'Highlight junk-heavy rows':'Clear highlight';
};
